<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PageRoast</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <span class="header__flame">🔥</span>
        <span class="header__title">PageRoast</span>
      </div>
      <button class="btn-icon" id="btn-settings" title="Settings">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.6 2.6l1.1 1.1M11.3 11.3l1.1 1.1M2.6 12.4l1.1-1.1M11.3 3.7l1.1-1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- Main view -->
    <div id="view-main">
      <div class="roast-stage">
        <div id="roast-output" class="roast-output roast-output--empty">
          <span class="roast-placeholder">Click the button.<br>We'll handle the rest.</span>
        </div>
        <div id="roast-meta" class="roast-meta hidden"></div>
      </div>

      <div class="actions">
        <button class="btn-roast" id="btn-roast">🔥 ROAST THIS PAGE</button>
        <div class="action-row hidden" id="action-row">
          <button class="btn-secondary" id="btn-copy">Copy</button>
          <button class="btn-secondary" id="btn-again">Roast Again</button>
        </div>
      </div>

      <a id="btn-donate" href="#" target="_blank" class="btn-donate">☕ Buy me a coffee</a>
    </div>

    <!-- Settings view -->
    <div id="view-settings" class="hidden">
      <div class="settings-section">
        <label class="settings-label" for="input-apikey">GOOGLE GEMINI API KEY</label>
        <input class="settings-input" id="input-apikey" type="password"
          placeholder="AIza..." autocomplete="off" spellcheck="false" />
        <p class="settings-hint">
          Free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> — just sign in with Google.
          Stored locally, never sent anywhere except Google.
        </p>
      </div>

      <div class="settings-section">
        <label class="settings-label" for="input-model">GEMINI MODEL</label>
        <input class="settings-input" id="input-model" type="text"
          placeholder="gemini-2.5-flash" autocomplete="off" spellcheck="false" />
        <p class="settings-hint">Check <a href="https://aistudio.google.com" target="_blank">AI Studio</a> for available models.</p>
      </div>

      <div class="settings-section">
        <label class="settings-label">ROAST STYLE</label>
        <div class="style-picker" id="style-picker">
          <button class="style-btn active" data-style="savage">Savage</button>
          <button class="style-btn" data-style="british">British</button>
          <button class="style-btn" data-style="philosopher">Philosopher</button>
          <button class="style-btn" data-style="boomer">Boomer</button>
        </div>
      </div>

      <button class="btn-save" id="btn-save-settings">Save</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
